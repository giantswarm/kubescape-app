name: Sync from upstream

on:
  push:
    branches:
      - 'renovate/kubescape-helm-charts*'
  workflow_dispatch:

env:
  # Repo-specific settings – update these when extracting to github-workflows
  CHART_DIR: helm/kubescape
  UPDATE_BRANCH: 'main#update-chart'

jobs:
  prepare-update-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare update branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin
          git checkout main
          git checkout -B "${{ env.UPDATE_BRANCH }}"
          git checkout "origin/${{ github.ref_name }}" -- vendir.yml
          git add vendir.yml
          git commit -m "Update vendir.yml from upstream"
          git push origin "${{ env.UPDATE_BRANCH }}" --force

  call-update-chart:
    needs: prepare-update-branch
    uses: ./.github/workflows/zz_generated.update_chart.yaml
    with:
      branch: 'main#update-chart'
    secrets: inherit
    permissions:
      contents: write

  sync-and-update:
    runs-on: ubuntu-latest
    needs: call-update-chart
    outputs:
      entries: ${{ steps.changelogger.outputs.entries }}
      new_values: ${{ steps.values_sync_dry_run.outputs.new_values }}
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.UPDATE_BRANCH }}
          token: ${{ steps.generate_token.outputs.token }}
      - name: Fetch main branch for version comparison
        run: git fetch origin main
      - name: Run values-sync dry-run
        id: values_sync_dry_run
        run: |
          new_values=$(docker run --rm \
            -v ${{ github.workspace }}:/github/workspace \
            gsoci.azurecr.io/giantswarm/shield-values-sync:0.0.3 \
            --add-new --dry-run \
            --chart-dir /github/workspace/${{ env.CHART_DIR }} \
            --config /github/workspace/values-sync-ignore.yaml || true)
          echo "${new_values}"
          if [[ -n "${new_values}" ]]; then
            delimiter=$(openssl rand -hex 16)
            {
              echo "new_values<<${delimiter}"
              printf '%s\n' "${new_values}"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Run values-sync
        uses: docker://gsoci.azurecr.io/giantswarm/shield-values-sync:0.0.3
        with:
          args: --chart-dir /github/workspace/${{ env.CHART_DIR }} --config /github/workspace/values-sync-ignore.yaml
      - name: Run schema-gen
        uses: docker://gsoci.azurecr.io/giantswarm/shield-schema-gen:0.0.3
        with:
          args: --chart-dir /github/workspace/${{ env.CHART_DIR }}
      - name: Detect dependency version changes
        id: detect
        run: |
          set -euxo pipefail

          CHART_YAML="${{ env.CHART_DIR }}/Chart.yaml"
          deps=$(awk '
            /^dependencies:/ { in_deps=1; next }
            in_deps && /^[^[:space:]]/ { in_deps=0 }
            in_deps && /name:/ { print $NF }
          ' "${CHART_YAML}")

          entries_file=$(mktemp)
          while IFS= read -r dep; do
            subchart="${{ env.CHART_DIR }}/charts/${dep}/Chart.yaml"
            if [[ ! -f "${subchart}" ]]; then
              echo "warning: ${subchart} not found, skipping ${dep}" >&2
              continue
            fi

            new_version=$(grep -E "^appVersion:" "${subchart}" | awk '{print $NF}' || true)
            old_version=$(git show origin/main:"${subchart}" 2>/dev/null \
              | grep -E "^appVersion:" | awk '{print $NF}' || true)

            if [[ "${old_version}" == "${new_version}" ]]; then
              echo "No version change for ${dep} (${new_version}), skipping"
              continue
            fi

            [[ "${new_version}" != v* ]] && new_version="v${new_version}"
            echo "- Updated \`${dep}\` to upstream version \`${new_version}\`." >> "${entries_file}"
          done <<< "${deps}"

          echo "entries_file=${entries_file}" >> "$GITHUB_OUTPUT"
      - name: Run changelogger
        id: changelogger
        run: |
          set -euo pipefail

          entries_file="${{ steps.detect.outputs.entries_file }}"
          args=()
          entries=""
          while IFS= read -r entry; do
            args+=(--add-changed "${entry}")
            entries="${entries}${entry}"$'\n'
          done < "${entries_file}"

          if [[ ${#args[@]} -gt 0 ]]; then
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              gsoci.azurecr.io/giantswarm/shield-changelogger:0.0.3 \
              --changelog-path /workspace/CHANGELOG.md \
              "${args[@]}"
          fi

          if [[ -n "${entries}" ]]; then
            delimiter=$(openssl rand -hex 16)
            {
              echo "entries<<${delimiter}"
              printf '%s' "${entries}"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push
        run: |
          git config --local user.email "149080493+heraldbot[bot]@users.noreply.github.com"
          git config --local user.name "HeraldBot[bot]"
          git add ${{ env.CHART_DIR }}/values.yaml ${{ env.CHART_DIR }}/values.schema.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "Sync values, schema and changelog from upstream"
          git push origin ${{ env.UPDATE_BRANCH }}

  update-pr-description:
    runs-on: ubuntu-latest
    needs: sync-and-update
    if: needs.sync-and-update.outputs.entries != '' || needs.sync-and-update.outputs.new_values != ''
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HERALD_APP_ID }}
          private-key: ${{ secrets.HERALD_APP_KEY }}
      - name: Update PR description
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          ENTRIES: ${{ needs.sync-and-update.outputs.entries }}
          NEW_VALUES: ${{ needs.sync-and-update.outputs.new_values }}
        run: |
          body=""
          if [[ -n "${ENTRIES}" ]]; then
            body+="$(printf '### Changes\n\n%s\n' "${ENTRIES}")"
          fi
          if [[ -n "${NEW_VALUES}" ]]; then
            body+="$(printf '### New values\n\n```yaml\n%s\n```\n' "${NEW_VALUES}")"
          fi
          gh pr edit '${{ env.UPDATE_BRANCH }}' \
            --repo ${{ github.repository }} \
            --body "${body}"
