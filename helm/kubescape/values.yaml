# Values for the kubescape operator app

exceptions:
  enabled: true
  namespace: policy-exceptions

image:
  name: ""
  tag: ""

kubescape-operator:
  capabilities:
    operator: enable
    configurationScan: enable
    continuousScan: enable
    nodeScan: enable

    vulnerabilityScan: enable
    scanEmbeddedSBOMs: disable
    relevancy: disable
    malwareDetection: enable

    runtimeObservability: enable
    networkPolicyService: enable
    runtimeDetection: enable
    nodeProfileService: enable
    seccompProfileService: enable
    nodeSbomGeneration: enable

    prometheusExporter: enable

  kubescape:
    serviceMonitor:
      enabled: true
      additionalLabels:
        application.giantswarm.io/team: shield
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape"
  operator:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-operator"
  kubevuln:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-kubevuln"
  storage:
    forceVirtualCrds: true
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-storage"
  hostScanner:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-host-scanner"
  clamav:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-klamav"
  synchronizer:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-synchronizer"
  otelCollector:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-otel-collector"
  kubescapeScheduler:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-http-request"
  kubevulnScheduler:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-http-request"
  registryScanScheduler:
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-http-request"
  nodeAgent:
    config:
      stdoutExporter: true
      maxLearningPeriod: 12h
      learningPeriod: 2m
      updatePeriod: 10m
      prometheusExporter: enable
    serviceMonitor:
      enabled: true
      additionalLabels:
        application.giantswarm.io/team: shield
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-node-agent"
  prometheusExporter:
    enableWorkloadMetrics: true
    image:
      repository: "gsoci.azurecr.io/giantswarm/kubescape-prometheus-exporter"
  serviceDiscovery:
    urlDiscovery:
      image:
        repository: "gsoci.azurecr.io/giantswarm/kubescape-http-request"
    configMapUpdate:
      image:
        repository: "gsoci.azurecr.io/giantswarm/kubectl"

podLogs:
  enabled: true
  commonLabels: {}
  commonAnnotations: {}
  components:
    - name: grype-offline-db
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: grype-offline-db
    - name: host-scanner
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: host-scanner
    - name: kubescape
      enabled: true
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: kubescape
    - name: kubescape-scheduler
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: kubescape-scheduler
    - name: kubevuln
      enabled: true
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: kubevuln
    - name: kubevuln-scheduler
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: kubevuln-scheduler
    - name: node-agent
      enabled: true
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: node-agent
    - name: operator
      enabled: true
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: operator
    - name: otel-collector
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: otel-collector
    - name: prometheus-exporter
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: prometheus-exporter
    - name: storage
      enabled: true
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: storage
    - name: synchronizer
      enabled: false
      labels: {}
      annotations: {}
      matchLabels:
        app.kubernetes.io/component: synchronizer
